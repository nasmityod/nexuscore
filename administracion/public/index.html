<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#05080f" />
  <title>Nexus Core · Administración de Licencias</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%23090d18'/%3E%3Ctext x='16' y='23' font-family='monospace' font-size='20' font-weight='700' text-anchor='middle' fill='%23f0a500'%3EN%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/assets/css/admin.css" />
</head>
<body>

  <!-- ░░░░░░░░ LOGIN ░░░░░░░░ -->
  <div id="loginScreen" class="login-screen hidden">
    <form class="login-card" id="loginForm" autocomplete="off">
      <div class="login-brand">
        <div class="mark">NEXUS<b>CORE</b></div>
        <div class="sub">Administración · Licencias</div>
      </div>
      <label for="loginPassword">Contraseña del panel</label>
      <input id="loginPassword" type="password" placeholder="••••••••••••" autocomplete="current-password" />
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:18px;">Entrar</button>
      <div class="login-error" id="loginError"></div>
    </form>
  </div>

  <!-- ░░░░░░░░ APP ░░░░░░░░ -->
  <div id="appShell" class="app-shell hidden">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="mark">NEXUS<b>CORE</b></div>
        <div class="sub">Panel de distribución</div>
      </div>
      <nav class="nav" id="nav">
        <div class="nav-item" data-route="dashboard">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          <span>Panel</span>
        </div>
        <div class="nav-item" data-route="licencias">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 7a4 4 0 1 0-4 4"/><path d="m13 9 6 6"/><path d="m16 12 2 2"/><path d="m18 10 2 2"/></svg>
          <span>Licencias</span>
        </div>
        <div class="nav-item" data-route="clientes">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span>Clientes</span>
        </div>
        <div class="nav-item" data-route="vencimientos">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
          <span>Vencimientos</span>
        </div>
        <div class="nav-item" data-route="servidor">
          <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="6" rx="2"/><rect x="2" y="14" width="20" height="6" rx="2"/><path d="M6 7h.01M6 17h.01"/></svg>
          <span>Servidor</span>
        </div>
      </nav>
      <div class="nav-foot">
        <button class="btn btn-ghost btn-block" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:12px;">
          <button class="btn btn-icon menu-toggle" id="menuToggle" aria-label="Menú">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
          </button>
          <div class="page-title" id="pageTitle">Panel</div>
        </div>
        <div class="topbar-actions">
          <span class="server-pill" id="serverPill" title="Estado del servidor de licencias">
            <span class="dot"></span><span id="serverPillText">Conectando…</span>
          </span>
          <button class="btn btn-primary" id="newLicenseBtn">+ Nueva licencia</button>
        </div>
      </header>

      <main class="content" id="content"><!-- vistas montadas por app.js --></main>
    </div>
  </div>

  <div id="modalRoot"></div>
  <div id="toastRoot"></div>

  <script src="/assets/js/api.js"></script>
  <script src="/assets/js/ui.js"></script>
  <script src="/assets/js/app.js"></script>
</body>
</html>
