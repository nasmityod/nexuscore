  <script>
    // Anti-FOUC: aplicar tema guardado antes de que el DOM renderice
    (function() {
      try {
        var params = new URLSearchParams(window.location.search);
        var t = params.get('theme') || localStorage.getItem('nexus_theme') || 'dark';
        if (t !== 'light' && t !== 'dark') t = 'dark';
        document.documentElement.setAttribute('data-theme', t);
        try { localStorage.setItem('nexus_theme', t); } catch (e2) {}
        var m = document.querySelector('meta[name="theme-color"]');
        if (m) m.content = t === 'light' ? '#f4f6fa' : '#0a0e1a';
      } catch(e) {}
    })();
  </script>
  <script>
    // Reemplaza window.confirm/window.alert por diálogos nativos del proceso
    // principal (nexusDialogs, expuesto por el preload). En Windows, los diálogos
    // JS de Chromium dejan el foco de teclado atascado en el webContents: tras
    // cerrarlos no se puede escribir en los inputs (p. ej. el login al cerrar
    // sesión) hasta hacer clic fuera de la app y volver. Esta sustitución elimina
    // el bug en TODOS los confirm()/alert() de la app sin tocar cada llamada.
    (function () {
      try {
        var nativeConfirm = typeof window.confirm === 'function' ? window.confirm.bind(window) : null;
        var nativeAlert = typeof window.alert === 'function' ? window.alert.bind(window) : null;
        // Se resuelve nexusDialogs en el momento de la llamada (no al cargar) para
        // ser inmune al orden de carga del preload; los confirm()/alert() ocurren
        // por interacción del usuario, mucho después de exponerse nexusDialogs.
        window.confirm = function (message) {
          if (window.nexusDialogs && typeof window.nexusDialogs.confirm === 'function') {
            return window.nexusDialogs.confirm(message);
          }
          return nativeConfirm ? nativeConfirm(message) : true;
        };
        window.alert = function (message) {
          if (window.nexusDialogs && typeof window.nexusDialogs.alert === 'function') {
            window.nexusDialogs.alert(message);
            return;
          }
          if (nativeAlert) nativeAlert(message);
        };
      } catch (e) { /* navegador sin preload: conservar diálogos nativos */ }
    })();
  </script>
