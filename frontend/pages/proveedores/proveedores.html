<section class="page-content proveedores-page" data-prov-root>
  <style>
    .proveedores-page .inv-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .proveedores-page .inv-table-wrap {
      overflow: auto;
      max-height: calc(100vh - 220px);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-sm);
      background: var(--bg-secondary);
    }
    .proveedores-page .inv-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .proveedores-page .inv-table th {
      position: sticky;
      top: 0;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
      text-align: left;
      padding: 0.55rem 0.5rem;
      border-bottom: 1px solid var(--border-primary);
      z-index: 1;
      font-weight: 600;
      white-space: nowrap;
    }
    .proveedores-page .inv-table td {
      padding: 0.35rem 0.5rem;
      border-bottom: 1px solid var(--border-subtle);
      vertical-align: middle;
    }
    .proveedores-page .inv-table tr:hover td {
      background: rgba(59, 130, 246, 0.06);
    }
    .proveedores-page .inv-cell-input {
      padding: 0.25rem 0.4rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-primary);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.85rem;
    }
    .proveedores-page .inv-cell-input:focus {
      outline: 2px solid var(--accent-primary);
      outline-offset: 0;
    }
    .proveedores-page .inv-muted {
      color: var(--text-muted);
    }
  </style>
  <div class="page-header">
    <div>
      <h1 class="page-title">Proveedores</h1>
      <p class="page-subtitle">Contactos y condiciones de compra</p>
    </div>
    <div class="page-header-actions">
      <button type="button" class="btn" data-prov-reload>Actualizar</button>
      <button type="button" class="btn btn-primary" data-prov-new>Nuevo proveedor</button>
    </div>
  </div>

  <div class="inv-toolbar">
    <input
      type="search"
      class="form-input"
      style="min-width:12rem;flex:1;max-width:20rem"
      data-prov-q
      placeholder="Buscar nombre, RIF, contacto…"
      aria-label="Buscar proveedores"
    />
  </div>

  <div class="card" style="margin-bottom:1rem" data-prov-form-wrap hidden>
    <h3 style="margin-top:0;font-size:1rem" data-prov-form-title>Editar proveedor</h3>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(11rem,1fr));gap:0.65rem">
      <label class="inv-muted" style="display:flex;flex-direction:column;gap:0.25rem;font-size:0.8rem">
        Nombre *
        <input class="inv-cell-input" data-prov-nombre required />
      </label>
      <label class="inv-muted" style="display:flex;flex-direction:column;gap:0.25rem;font-size:0.8rem">
        RIF
        <input class="inv-cell-input" data-prov-rif />
      </label>
      <label class="inv-muted" style="display:flex;flex-direction:column;gap:0.25rem;font-size:0.8rem">
        Contacto
        <input class="inv-cell-input" data-prov-contacto />
      </label>
      <label class="inv-muted" style="display:flex;flex-direction:column;gap:0.25rem;font-size:0.8rem">
        Teléfono
        <input class="inv-cell-input" data-prov-tel />
      </label>
      <label class="inv-muted" style="display:flex;flex-direction:column;gap:0.25rem;font-size:0.8rem">
        Email
        <input type="email" class="inv-cell-input" data-prov-email />
      </label>
    </div>
    <div style="margin-top:0.65rem;display:flex;flex-wrap:wrap;gap:0.5rem">
      <button type="button" class="btn btn-primary" data-prov-save>Guardar</button>
      <button type="button" class="btn btn-secondary" data-prov-cancel>Cancelar</button>
    </div>
  </div>

  <div class="inv-table-wrap">
    <table class="inv-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>RIF</th>
          <th>Contacto</th>
          <th>Teléfono</th>
          <th>Activo</th>
          <th></th>
        </tr>
      </thead>
      <tbody data-prov-tbody></tbody>
    </table>
  </div>
  <p class="inv-muted" style="margin-top:0.5rem;font-size:0.8rem" data-prov-status></p>
</section>
